name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Build app
        env:
          SIGNING_IDENTITY: "-"
        run: ./Scripts/build-app.sh
      - name: Verify bundle
        run: |
          plutil -lint "dist/Mac Input Lock.app/Contents/Info.plist"
          codesign --verify --deep --strict "dist/Mac Input Lock.app"
