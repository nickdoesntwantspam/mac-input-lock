name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/developer-id.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERTIFICATE"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security import "$CERTIFICATE" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      - name: Write notarization key
        env:
          API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "$API_KEY_P8" > "$KEY_PATH"
          echo "APPLE_API_KEY_P8=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, and validate
        env:
          SIGNING_IDENTITY: "Developer ID Application: Nicholas Williams (${{ secrets.APPLE_TEAM_ID }})"
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./Scripts/release.sh

      - name: Retain official build for website fulfillment
        uses: actions/upload-artifact@v4
        with:
          name: mac-input-lock-${{ github.ref_name }}-official-build
          path: |
            dist/Mac-Input-Lock-*.dmg
            dist/Mac-Input-Lock-*.dmg.sha256
          if-no-files-found: error
          retention-days: 1

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --title "Mac Input Lock ${GITHUB_REF_NAME#v}" \
            dist/Mac-Input-Lock-*.dmg \
            dist/Mac-Input-Lock-*.dmg.sha256
